<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Robozin LN SHOW - GOD</title>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

.container{
    border:2px solid red;
    padding:20px;
    margin:20px;
    border-radius:10px;
    box-shadow:0 0 20px red;
}

input{
    display:block;
    margin:5px auto;
    padding:8px;
    width:200px;
}

button{
    margin-top:10px;
    padding:10px;
    background:red;
    color:#fff;
    border:none;
    cursor:pointer;
}

#resultado{
    margin-top:20px;
    white-space:pre-line;
}
</style>

</head>

<body>

<h1>🤖 Robozin LN SHOW - GOD</h1>

<div class="container">

<input id="tempo" placeholder="Tempo (min)">

<!-- 🔥 PLACAR ADICIONADO -->
<h2>Placar Atual</h2>
<input id="placarCasa" placeholder="Gols Casa">
<input id="placarFora" placeholder="Gols Fora">

<h2>Time Casa</h2>
<input id="finalCasa" placeholder="Finalizações">
<input id="golCasa" placeholder="Chutes no gol">
<input id="escanteioCasa" placeholder="Escanteios">
<input id="ataqueCasa" placeholder="Ataques">
<input id="perigoCasa" placeholder="Ataques perigosos">
<input id="posseCasa" placeholder="Posse (%)">
<input id="cartaoCasa" placeholder="Cartões">

<h2>Time Fora</h2>
<input id="finalFora" placeholder="Finalizações">
<input id="golFora" placeholder="Chutes no gol">
<input id="escanteioFora" placeholder="Escanteios">
<input id="ataqueFora" placeholder="Ataques">
<input id="perigoFora" placeholder="Ataques perigosos">
<input id="posseFora" placeholder="Posse (%)">
<input id="cartaoFora" placeholder="Cartões">

<button onclick="analisar()">ANALISAR JOGO</button>

<div id="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
